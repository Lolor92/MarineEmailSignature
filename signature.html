<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marine Email Signature</title>
    <style>
      body {
        margin: 0;
        padding: 40px 16px;
        background: #e2e8f0;
        font-family: Arial, sans-serif;
        color: #0f172a;
      }

      .shell {
        max-width: 860px;
        margin: 0 auto;
      }

      .card {
        background: #fff;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 24px;
        border-bottom: 1px solid #e2e8f0;
        background: #f8fafc;
      }

      .button {
        border: 0;
        border-radius: 999px;
        background: #0f766e;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        padding: 10px 18px;
        cursor: pointer;
      }

      .preview {
        padding: 28px;
        overflow-x: auto;
      }

      .note {
        margin-top: 24px;
        background: #ecfeff;
        border: 1px solid #bae6fd;
        border-radius: 20px;
        padding: 20px 24px;
        font-size: 14px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <div class="toolbar">
          <strong>Marine Email Signature</strong>
          <button class="button" id="copyButton" type="button">Copy Signature</button>
        </div>
        <div class="preview">
          <div id="signature-root" style="background:#fff; padding:20px; display:inline-block;">
            <img
              src="./public/signature-card.png"
              data-remote-src="https://raw.githubusercontent.com/Lolor92/MarineEmailSignature/main/public/signature-card.png"
              alt="Marine email signature"
              width="620"
              height="330"
              style="display:block; width:620px; max-width:620px; height:330px; border:0;"
            />
          </div>
        </div>
      </div>

      <div class="note">
        This version is flattened into a single image so Outlook keeps the boat background, dark overlay,
        logo placement, and colors much closer to the preview. Paste it into Outlook after clicking
        <strong>Copy Signature</strong>.
      </div>
    </div>

    <script>
      const copyButton = document.getElementById('copyButton');
      const signatureRoot = document.getElementById('signature-root');

      copyButton.addEventListener('click', () => {
        const copyNode = signatureRoot.cloneNode(true);
        copyNode.querySelectorAll('img[data-remote-src]').forEach((img) => {
          img.setAttribute('src', img.getAttribute('data-remote-src'));
        });

        copyNode.style.position = 'fixed';
        copyNode.style.left = '-99999px';
        copyNode.style.top = '0';
        document.body.appendChild(copyNode);

        const range = document.createRange();
        range.selectNode(copyNode);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        document.execCommand('copy');
        selection.removeAllRanges();
        document.body.removeChild(copyNode);

        copyButton.textContent = 'Copied';
        setTimeout(() => {
          copyButton.textContent = 'Copy Signature';
        }, 2000);
      });
    </script>
  </body>
</html>
